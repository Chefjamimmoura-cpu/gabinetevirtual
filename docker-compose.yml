version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# Gabinete Carol — Hub Next.js
#
# Este compose gerencia APENAS o gabinete-carol.
# O cmbv-parecer continua gerenciado pelo seu próprio compose em ../cmbv-parecer/.
#
# Comunicação interna com cmbv-parecer:
#   Ambos os serviços compartilham a rede externa "proxy" do Traefik.
#   O Next.js chama http://cmbv-parecer:4000 via CMBV_PARECER_INTERNAL_URL.
# ──────────────────────────────────────────────────────────────────────────────

services:
  gabinete-carol:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: gabinete-carol
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Supabase
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Gemini IA
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Evolution API (WhatsApp — CIa)
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      # cmbv-parecer acessível internamente pelo nome do container
      - CMBV_PARECER_INTERNAL_URL=http://cmbv-parecer:4000
      # Sync SAPL — Mirroring Passivo (V3-F1)
      - SYNC_SECRET=${SYNC_SECRET}
      - GABINETE_ID=${GABINETE_ID:-f25299db-1c33-45b9-830f-82f6d2d666ef}
      # Importação Fala Cidadão (V4-F2)
      - FALA_CIDADAO_API_URL=${FALA_CIDADAO_API_URL}
      - FALA_CIDADAO_APP_KEY=${FALA_CIDADAO_APP_KEY}
      - FALA_CIDADAO_LOGIN=${FALA_CIDADAO_LOGIN}
      - FALA_CIDADAO_PASSWORD=${FALA_CIDADAO_PASSWORD}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gabinete-carol.rule=Host(`gabinete.wonetechnology.cloud`)"
      - "traefik.http.routers.gabinete-carol.entrypoints=websecure"
      - "traefik.http.routers.gabinete-carol.tls.certresolver=letsencrypt"
      - "traefik.http.services.gabinete-carol.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
